name: Quality Gates

on:
  push:
    branches:
      - Mainv2
      - main
  pull_request:
    branches:
      - Mainv2
      - main

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, Test, Build, Smoke E2E
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: "true"
      MONGODB_URI: mongodb://127.0.0.1:27017/laundryease_ci
      MONGODB_DB: laundryease_ci
      GOOGLE_ID: ci-google-id
      GOOGLE_SECRET: ci-google-secret
      EMAIL_USER: ci-email-user
      EMAIL_PASS: ci-email-pass
      TWILIO_ACCOUNT_SID: ci-twilio-sid
      TWILIO_AUTH_TOKEN: ci-twilio-token
      TWILIO_PHONE_NUMBER: "+10000000000"
      RAZORPAY_KEY_ID: ci-razorpay-key-id
      RAZORPAY_KEY_SECRET: ci-razorpay-key-secret
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ci-public-razorpay-key-id
      RAZORPAYX_ACCOUNT_NUMBER: ""
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ci-google-maps-key
      CRON_SECRET: ci-cron-secret
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://127.0.0.1:3405
      NEXT_PUBLIC_BASE_URL: http://127.0.0.1:3405
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3405
      CLOUDINARY_CLOUD_NAME: ci-cloudinary-cloud
      CLOUDINARY_API_KEY: ci-cloudinary-key
      CLOUDINARY_API_SECRET: ci-cloudinary-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit and Integration Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke E2E (Role Journeys)
        run: npm run test:e2e -- e2e/smoke-role-journeys.spec.ts

      - name: Upload Playwright output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-output
          path: output/playwright
          if-no-files-found: ignore
          retention-days: 7
