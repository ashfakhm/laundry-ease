name: CI

on:
  pull_request:
  push:
    branches:
      - Mainv2

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GOOGLE_ID: ci-google-id
      GOOGLE_SECRET: ci-google-secret
      MONGODB_URI: mongodb://127.0.0.1:27017/laundryease_ci
      MONGODB_DB: laundryease_ci
      EMAIL_USER: ci@example.com
      EMAIL_PASS: ci-password
      TWILIO_ACCOUNT_SID: ci-twilio-sid
      TWILIO_AUTH_TOKEN: ci-twilio-token
      TWILIO_PHONE_NUMBER: +10000000000
      RAZORPAY_KEY_ID: ci-razorpay-key-id
      RAZORPAY_KEY_SECRET: ci-razorpay-secret
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ci-public-razorpay-key
      RAZORPAYX_ACCOUNT_NUMBER: ci-account-number
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ci-google-maps-key
      CRON_SECRET: ci-cron-secret
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build
